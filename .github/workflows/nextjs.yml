# Workflow для деплоя Next.js приложения на GitHub Pages
# Документация: https://nextjs.org/docs/deployment

name: Deploy to GitHub Pages

on:
  # Запуск при пуше в ветку main
  push:
    branches:
      - main
  
  # Возможность ручного запуска из Actions tab
  workflow_dispatch:

# Разрешения для GITHUB_TOKEN
permissions:
  contents: read
  pages: write
  id-token: write

# Отменяем предыдущие запуски для этого же репозитория и ветки
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # Сборка проекта
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          # Автоматически определяет имя репозитория для basePath
          static_site_generator: next
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build with Next.js
        run: npm run build
        env:
          # Устанавливаем переменные окружения для сборки
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
          NEXT_PUBLIC_ASSET_PREFIX: /${{ github.event.repository.name }}/
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  # Деплой на GitHub Pages
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
